<div
  appHighlight="lightyellow"
  [ngClass]="cardClasses"
  [ngStyle]="{'border-left': '8px solid ' + borderColor}"
  style="border:1px solid black; padding:10px; margin:10px; cursor:pointer;"
  (click)="onCardClick()">

  <h3>{{ course.name }}</h3>

  <p>ID: {{ course.id }}</p>

  <p>Code: {{ course.code }}</p>

  <p>Credits: {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">
    <p *ngSwitchCase="'passed'" style="color:green">
      Passed
    </p>

    <p *ngSwitchCase="'failed'" style="color:red">
      Failed
    </p>

    <p *ngSwitchCase="'pending'" style="color:gray">
      Pending
    </p>
  </div>

  <button (click)="toggleEnrollment($event)">
    {{
      (enrolledIds$ | async)?.includes(course.id)
        ? 'Unenroll'
        : 'Enroll'
    }}
  </button>

  <button
    (click)="toggleDetails(); $event.stopPropagation()">
    Show Details
  </button>

</div>
