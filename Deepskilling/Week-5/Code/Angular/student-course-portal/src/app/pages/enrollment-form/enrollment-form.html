<h2>Student Enrollment Form</h2>

<form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->
  <label>Student Name</label><br>

  <input
    type="text"
    name="studentName"
    [(ngModel)]="studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">

  <div *ngIf="nameCtrl.touched">
    <span *ngIf="nameCtrl.errors?.['required']">
      Name is required
    </span>
    <span *ngIf="nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
    </span>
  </div>
  <br><br>

  <!-- Email -->
  <label>Email</label><br>

  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    required
    email
    #emailCtrl="ngModel">

  <div *ngIf="emailCtrl.touched">
    <span *ngIf="emailCtrl.errors?.['required']">
      Email is required
    </span>
    <span *ngIf="emailCtrl.errors?.['email']">
      Invalid email address
    </span>
  </div>
  <br><br>

  <!-- Course ID -->
  <label>Course ID</label><br>

  <input
    type="number"
    name="courseId"
    [(ngModel)]="courseId"
    required
    #courseCtrl="ngModel">

  <div *ngIf="courseCtrl.touched">
    <span *ngIf="courseCtrl.errors?.['required']">
      Course ID is required
    </span>
  </div>
  <br><br>

  <!-- Preferred Semester -->
  <label>Preferred Semester</label>

  <select
    name="preferredSemester"
    [(ngModel)]="preferredSemester">
    <option value="">Select</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>
  <br><br>
  <!-- Agree to Terms -->
  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      required
      #termsCtrl="ngModel">
    I Agree to the Terms
  </label>

  <div *ngIf="termsCtrl.touched">
    <span *ngIf="termsCtrl.errors?.['required']">
      Please accept the Terms
    </span>
  </div>
  <br><br>

  <!-- Submit Button -->
  <button
    type="submit"
    [disabled]="enrollForm.invalid">
    Submit
  </button>

  &nbsp;

  <!-- Reset Button -->
  <button
    type="button"
    (click)="enrollForm.resetForm(); submitted = false">
    Reset
  </button>
</form>
<br>

<div *ngIf="errorMessage" style="color:red;">
  {{ errorMessage }}
</div>

<!-- Success Message -->
<div *ngIf="submitted">
  <h3>Enrollment request submitted successfully!</h3>
</div>
