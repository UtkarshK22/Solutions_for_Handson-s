<h1>{{ portalName }}</h1>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search courses">

<p>Searching for: {{ searchTerm }}</p>

<p>
  This portal helps students browse courses, manage enrollment,
  and view their academic profile.
</p>

<div>
  <p><strong>Courses Available:</strong> {{ coursesAvailable }}</p>
  <p><strong>Enrolled:</strong> 3</p>
  <p><strong>GPA:</strong> 3.8</p>
</div>
