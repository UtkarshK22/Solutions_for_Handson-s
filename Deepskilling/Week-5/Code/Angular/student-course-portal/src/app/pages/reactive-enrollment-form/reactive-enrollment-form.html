<h2>Reactive Enrollment Form</h2>

<form
  [formGroup]="enrollForm"
  (ngSubmit)="onSubmit()">

  <!-- Student Name -->
  <label>Student Name</label><br>

  <input
    type="text"
    formControlName="studentName">

  <br><br>

    <!-- Email -->
<label>Email</label><br>

<input
  type="email"
  formControlName="studentEmail">

<div *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
  Email already taken.
</div>

<br><br>

<!-- Course ID -->
<label>Course ID</label><br>

<input
  type="text"
  formControlName="courseId">

<div *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
  Course code starting with XX is not allowed.
</div>

<br><br>

<!-- Preferred Semester -->
<label>Preferred Semester</label><br>

<select formControlName="preferredSemester">
  <option value="Odd">Odd</option>
  <option value="Even">Even</option>
</select>

<br><br>

<!-- Additional Courses -->
<h3>Additional Courses</h3>

<button
  type="button"
  (click)="addCourse()">
  Add Another Course
</button>

<br><br>

<div *ngFor="let ctrl of additionalCourses.controls; let i = index">

  <input [formControl]="$any(ctrl)">

  <button
    type="button"
    (click)="removeCourse(i)">
    Remove
  </button>

  <br><br>

</div>

<!-- Terms -->
<label>
  <input
    type="checkbox"
    formControlName="agreeToTerms">
  I Agree to the Terms
</label>

<br><br>

<!-- Submit -->
<button
  type="submit"
  [disabled]="enrollForm.invalid">
  Submit
</button>

</form>
